<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Me</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Quicksand:wght@300..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    

    <div class="parent">
        <span>
        <i class="fa-solid fa-robot robot-icon"></i>
        <h1>Ask AI</h1>
        </span>
    </div>
    


    <p class="greeting">Hey there! what do you want to know?</p>



    <div class="ai-answer">
        <p id="answer"></p>
    </div>


    
    <div class="search-box" id="search-box">
        <input type="text" id="search-input" placeholder="Ask me anything...">
        <i class="fa-solid fa-microphone microphone-icon" id="microphone-icon"></i>
        <button id="search-button" style="display: none;"></button>
    </div>















    <script src="script.js"></script>
</body>
</html>
